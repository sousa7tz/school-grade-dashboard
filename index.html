<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Grade de aulas escolar com navegação por gestos, glassmorphism e PWA.">
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="School Grade Dashboard">
    <meta name="application-name" content="School Grade Dashboard">

    <title>School Grade Dashboard</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

    <canvas id="stars-canvas" aria-hidden="true"></canvas>

    <button type="button" class="nav-btn" id="nav-prev" aria-label="Dia anterior">〈</button>

    <div class="main-content">
        <a href="https://github.com/sousa7tz" target="_blank" rel="noopener noreferrer" class="github-link">github: sousa7tz</a>

        <div class="schedule-shell">
            <div class="view-port" id="view-port">
                <div class="view-port__cards" id="card-container"></div>
                <nav class="day-dots" id="day-dots" aria-label="Dias da semana"></nav>
            </div>
        </div>
    </div>

    <button type="button" class="nav-btn" id="nav-next" aria-label="Próximo dia">〉</button>

    <script type="module" src="app.js"></script>
</body>
</html>
